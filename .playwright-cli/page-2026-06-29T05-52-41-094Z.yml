      - paragraph [ref=e14]: Lunar terrain. Autonomous excavation. A rover engineered for NASA’s Lunabotics challenge.
      - paragraph [ref=e15] [cursor=pointer]: About the Project
    - generic [ref=e16]:
      - paragraph [ref=e18]: TThe Robotics project is designing and building a fully autonomous lunar rover for NASA's annual Lunabotics Challenge, a national competition where university teams simulate real lunar surface operations by constructing a robot capable of excavating and transporting regolith — moon-like soil — while navigating a competition arena that mimics the lunar environment. The team's rover is developed entirely in-house, with student-led subsystems spanning mechanical design, embedded systems, autonomy, perception, and control, featuring terrain-adaptive locomotion, regolith excavation tools, and autonomous navigation algorithms optimized for excavation throughput and energy efficiency. By engineering under stringent NASA competition rules and real lunar mission constraints — resource limitation, autonomous decision-making, and dust mitigation — members gain hands-on experience in planetary robotics, systems integration, and mission-driven problem solving, preparing them for careers in aerospace, robotics, and beyond.
