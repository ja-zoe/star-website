      - paragraph [ref=e13]: Cube Satellite
      - paragraph [ref=e14]: Fuel slosh. Orbital control. Rutgers’ first student satellite — engineered for microgravity experimentation.
      - paragraph [ref=e15] [cursor=pointer]: About the Project
    - generic [ref=e16]:
      - generic [ref=e17]:
        - paragraph [ref=e18]: The CubeSat project is developing SPICEsat, Rutgers University’s first student-built satellite. This mission is part of the prestigious University Nanosatellite Program, under mentorship from faculty and guidance from industry professionals. The satellite’s primary scientific objective is to investigate fluid sloshing dynamics in microgravity, a critical problem in spacecraft fuel management. By characterizing slosh behavior and testing active control stabilization algorithms in orbit, SPICEsat aims to advance the state of onboard fuel modeling and control strategies beyond what passive systems allow.
        - paragraph [ref=e19]: Students on the team are directly involved in the complete satellite lifecycle—from mission conceptualization and payload integration to subsystem testing and full-system validation. SPICEsat uses a combination of COTS components and custom hardware, offering students exposure to real-world spacecraft design and interdisciplinary systems engineering. With an engineering model already in testing, the mission is rapidly progressing toward flight readiness and serves as a launchpad for the next generation of space systems engineers.
